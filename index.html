<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Dark ATM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="atm-machine">
        <div class="atm-header">ATM</div>
        
        <div class="screen-container">
            <div id="login-screen" class="screen">
                <p id="login-msg">WELCOME<br>PLEASE ENTER PIN</p>
                <div class="pin-dots" id="pin-dots">****</div>
            </div>

            <div id="main-screen" class="screen" style="display: none;">
                <p id="status-msg">SELECT TRANSACTION</p>
                <div class="balance-area">
                    BALANCE: $<span id="balance">1000</span>
                </div>
            </div>
        </div>

        <input type="password" id="atm-input" placeholder="ENTER HERE" readonly>

        <div class="keypad">
            <button onclick="press(1)">1</button>
            <button onclick="press(2)">2</button>
            <button onclick="press(3)">3</button>
            <button class="btn-cancel" onclick="clearAll()">CANCEL</button>

            <button onclick="press(4)">4</button>
            <button onclick="press(5)">5</button>
            <button onclick="press(6)">6</button>
            <button class="btn-action" onclick="setMode('withdraw')">WITHDRAW</button>

            <button onclick="press(7)">7</button>
            <button onclick="press(8)">8</button>
            <button onclick="press(9)">9</button>
            <button class="btn-action" onclick="setMode('deposit')">DEPOSIT</button>

            <button class="empty"></button>
            <button onclick="press(0)">0</button>
            <button class="empty"></button>
            <button class="btn-enter" onclick="handleEnter()">ENTER</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
